<script>
const labels = [
  'Stage 1 of 6 — OPM-MEG baseline: quantum sensors map whole-brain magnetic fields',
  'Stage 2 of 6 — P300 MERMER: crime-specific stimuli presented; recognition brainwave detected',
  'Stage 3 of 6 — Receptor mapping: fluorescent ligands light up dopamine, androgen, serotonin circuits',
  'Stage 4 of 6 — Acoustic implants placed: sinus and ear canal probes — soft tissue only',
  'Stage 5 of 6 — Theta-burst stimulation: acoustic pulses at amygdala-hippocampal resonance frequency',
  'Stage 6 of 6 — Memory reconstruction: visual cortex and temporal lobe decoded to evidentiary artifact'
];
let cur = 0;
function show(n) {
  document.getElementById('layer-'+cur).style.display='none';
  document.querySelectorAll('.stage-btn')[cur].classList.remove('active');
  cur = n;
  document.getElementById('layer-'+cur).style.display='';
  document.querySelectorAll('.stage-btn')[cur].classList.add('active');
  document.getElementById('stage-label').textContent = labels[cur];
}
function next(){ show((cur+1)%6); }
function prev(){ show((cur+5)%6); }
</script>
