<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BioStellar LLC — VTBT Forensic Evidence System</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a10; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: Arial, sans-serif; }
.card { max-width: 680px; width: 100%; padding: 8px; }

@keyframes pulse-center {
  0%,100%{r:28;opacity:1} 50%{r:34;opacity:.85}
}
@keyframes fade-in-up {
  from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)}
}
@keyframes beam {
  0%{stroke-dashoffset:120;opacity:0} 30%{opacity:1} 100%{stroke-dashoffset:0;opacity:1}
}
@keyframes bar-grow {
  from{width:0;opacity:0} to{opacity:1}
}
@keyframes score-count {
  0%{opacity:0} 60%{opacity:0} 100%{opacity:1}
}
@keyframes tick-in {
  0%,70%{opacity:0;transform:scale(0)} 80%{opacity:1;transform:scale(1.3)} 100%{opacity:1;transform:scale(1)}
}
@keyframes shimmer {
  0%,100%{opacity:.15} 50%{opacity:.35}
}
@media (prefers-reduced-motion: no-preference) {
  .center-pulse { animation: pulse-center 2.2s ease-in-out infinite; }
  .ax1 { animation: fade-in-up .5s .4s ease both; }
  .ax2 { animation: fade-in-up .5s .8s ease both; }
  .ax3 { animation: fade-in-up .5s 1.2s ease both; }
  .ax4 { animation: fade-in-up .5s 1.6s ease both; }
  .beam1 { animation: beam .7s .5s ease-out both; }
  .beam2 { animation: beam .7s .9s ease-out both; }
  .beam3 { animation: beam .7s 1.3s ease-out both; }
  .beam4 { animation: beam .7s 1.7s ease-out both; }
  .bar1 { animation: bar-grow .6s .7s ease both; }
  .bar2 { animation: bar-grow .6s 1.1s ease both; }
  .bar3 { animation: bar-grow .6s 1.5s ease both; }
  .bar4 { animation: bar-grow .6s 1.9s ease both; }
  .score { animation: score-count .4s 2.3s ease both; }
  .tick { animation: tick-in .4s 2.5s ease both; }
  .shimmer { animation: shimmer 3s 2s ease-in-out infinite; }
  .title-in { animation: fade-in-up .6s .1s ease both; }
  .sub-in { animation: fade-in-up .6s .25s ease both; }
}
.ax1,.ax2,.ax3,.ax4,.score,.tick,.title-in,.sub-in { opacity:0; }
</style>
</head>
